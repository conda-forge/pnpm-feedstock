schema_version: 1

context:
  name: pnpm
  version: "11.5.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/${{ name }}/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 60ee08aee9d8bd974a3eefbe0ba1720e961cd515271ab4b2d9c6f028e7908199

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - make
    - nodejs
    - if: win
      then:
        - m2-sed
      else:
        - sed
  host:
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - pnpm --help
  - package_contents:
      bin:
        - if: unix
          then:
            - pn
            - pnpx
            - pnx
        - pnpm
      files:
        - if: unix
          then:
            - lib/node_modules/pnpm/*
          else:
            - Library/share/pnpm/*
      strict: true

about:
  license: MIT
  license_file:
    - LICENSE
    - ThirdPartyLicenses.txt
  summary: 📦🚀 Fast, disk space efficient package manager
  homepage: https://github.com/pnpm/pnpm

extra:
  recipe-maintainers:
    - JaninaWibkerQC
    - xhochy
    - pavelzw
